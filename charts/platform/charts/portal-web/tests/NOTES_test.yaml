suite: test Portal Web NOTES.txt
templates:
  - NOTES.txt
chart:
  version: 1.0.0
  appVersion: "v1.0.0"
tests:
  # auth0.domain tests
  - it: should fail when auth0.domain is explicitly set to empty string
    set:
      auth0.domain: ""
    asserts:
      - failedTemplate:
          errorPattern: "Define the Auth0 domain at 'auth0.domain'\\."

  - it: should pass when auth0.domain is set to a literal value
    set:
      auth0.domain: myorg.auth0.com
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass with the default templated auth0.domain value
    set:
      global.platformExternalDomain: prod.example.com
    asserts:
      - hasDocuments:
          count: 1
