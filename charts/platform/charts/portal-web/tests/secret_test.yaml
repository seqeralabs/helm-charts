suite: test Portal Web secret
templates:
  - secret.yaml
chart:
  version: 1.2.3
  appVersion: "v9.9.9"
tests:
  - it: should NOT render any secret by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render imagePullSecret when global.imageCredentials is set
    set:
      global.imageCredentials:
        - registry: cr.seqera.io
          username: robot
          password: secret123
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
      - isNotNull:
          path: data[".dockerconfigjson"]

  - it: should NOT render imagePullSecret when global.imageCredentials is empty
    set:
      global.imageCredentials: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should apply secretLabels to imagePullSecret
    set:
      global.imageCredentials:
        - registry: cr.seqera.io
          username: robot
          password: secret123
      secretLabels:
        secret-label: secret-value
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            secret-label: secret-value

  - it: should apply commonAnnotations to imagePullSecret
    set:
      global.imageCredentials:
        - registry: cr.seqera.io
          username: robot
          password: secret123
      commonAnnotations:
        common-annotation: common-value
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            common-annotation: common-value
