suite: test Portal Web configmap
templates:
  - configmap.yaml
chart:
  version: 1.2.3
  appVersion: "v9.9.9"
tests:
  - it: should render a ConfigMap with default values
    asserts:
      - isKind:
          of: ConfigMap
      - matchSnapshot: {}

  - it: should set SEQERA_PLATFORM_API_URL from platformServiceAddress and platformServicePort
    set:
      global.platformServiceAddress: my-platform-backend
      global.platformServicePort: 9090
    asserts:
      - equal:
          path: data.SEQERA_PLATFORM_API_URL
          value: "http://my-platform-backend:9090"

  - it: should template platformServiceAddress in SEQERA_PLATFORM_API_URL
    set:
      global.platformServiceAddress: '{{ printf "%s-platform-backend" .Release.Name | lower }}'
      global.platformServicePort: 8080
    asserts:
      - equal:
          path: data.SEQERA_PLATFORM_API_URL
          value: "http://release-name-platform-backend:8080"

  - it: should set SEQERA_AUTH_DOMAIN with the external platform endpoint
    set:
      global.platformExternalDomain: prod.example.com
      global.platformServiceAddress: my-platform-backend
      global.platformServicePort: 9090
    asserts:
      - equal:
          path: data.SEQERA_AUTH_DOMAIN
          value: "https://prod.example.com/api"

  - it: should set SEQERA_AGENT_BACKEND_URL from agentBackendDomain
    set:
      global.agentBackendDomain: ai.prod.example.com
    asserts:
      - equal:
          path: data.SEQERA_AGENT_BACKEND_URL
          value: "https://ai.prod.example.com"

  - it: should template agentBackendDomain using platformExternalDomain
    set:
      global.platformExternalDomain: prod.example.com
      global.agentBackendDomain: '{{ printf "ai-api.%s" .Values.global.platformExternalDomain }}'
    asserts:
      - equal:
          path: data.SEQERA_AGENT_BACKEND_URL
          value: "https://ai-api.prod.example.com"

  - it: should apply commonLabels
    set:
      commonLabels:
        custom-label: custom-value
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            custom-label: custom-value

  - it: should apply configMapLabels
    set:
      configMapLabels:
        config-label: config-value
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            config-label: config-value

  - it: should apply configMapAnnotations
    set:
      configMapAnnotations:
        config-annotation: config-value
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            config-annotation: config-value
