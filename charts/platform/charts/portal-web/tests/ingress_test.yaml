suite: test Portal Web ingress
templates:
  - ingress.yaml
chart:
  version: 1.2.3
  appVersion: "v9.9.9"
tests:
  - it: should NOT render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when ingress.enabled is true
    set:
      ingress.enabled: true
    asserts:
      - isKind:
          of: Ingress
      - matchSnapshot: {}

  - it: should include default rule using global.portalWebDomain
    set:
      global.portalWebDomain: portal.example.com
      ingress.enabled: true
      ingress.path: /
      ingress.defaultPathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: portal.example.com
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].pathType
          value: Prefix
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: release-name-portal-web
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 80

  - it: should template global.portalWebDomain from platformExternalDomain
    set:
      global.platformExternalDomain: prod.example.com
      global.portalWebDomain: '{{ printf "portal.%s" .Values.global.platformExternalDomain }}'
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: portal.prod.example.com

  - it: should template global.portalWebDomain with release name
    set:
      global.portalWebDomain: "{{ .Release.Name }}.example.com"
      ingress.enabled: true
    asserts:
      - equal:
          path: spec.rules[0].host
          value: RELEASE-NAME.example.com

  - it: should set ingressClassName
    set:
      ingress.enabled: true
      ingress.ingressClassName: nginx
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx

  - it: should configure TLS
    set:
      ingress.enabled: true
      ingress.tls:
        - hosts:
            - portal.example.com
          secretName: portal-tls
    asserts:
      - isNotNull:
          path: spec.tls
      - equal:
          path: spec.tls[0].secretName
          value: portal-tls

  - it: should handle service.http.port as integer
    set:
      ingress.enabled: true
      service.http.port: 8888
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 8888

  - it: should include both default rule and extraHosts
    set:
      global.portalWebDomain: portal.example.com
      ingress.enabled: true
      ingress.path: /
      ingress.defaultPathType: Prefix
      ingress.extraHosts:
        - host: custom.example.com
          paths:
            - path: /api
              pathType: Prefix
              serviceName: api-service
              portNumber: 8080
    asserts:
      - lengthEqual:
          path: spec.rules
          count: 2
      - equal:
          path: spec.rules[0].host
          value: portal.example.com
      - equal:
          path: spec.rules[1].host
          value: custom.example.com
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.name
          value: api-service

  - it: should handle portNumber as template string in extraHosts
    set:
      ingress.enabled: true
      service.http.port: 7777
      ingress.extraHosts:
        - host: test.example.com
          paths:
            - path: /api
              serviceName: api-service
              portNumber: "{{ .Values.service.http.port }}"
    asserts:
      - equal:
          path: spec.rules[1].http.paths[0].backend.service.port.number
          value: 7777
