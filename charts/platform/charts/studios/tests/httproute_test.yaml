suite: test Studios httproute
templates:
  - httproute.yaml
chart:
  version: 1.2.3
  appVersion: "9.9.9"
tests:
  - it: should NOT render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when httpRoute.enabled is true
    set:
      httpRoute.enabled: true
    asserts:
      - isKind:
          of: HTTPRoute
      - matchRegex:
          path: apiVersion
          pattern: ^gateway\.networking\.k8s\.io/v1$

  - it: should render when global.httpRoute.enabled is true even if local is false
    set:
      httpRoute.enabled: false
      global.httpRoute.enabled: true
    asserts:
      - isKind:
          of: HTTPRoute

  - it: should expose the studios wildcard subdomain
    set:
      httpRoute.enabled: true
      global.studiosDomain: studios.example.com
    asserts:
      - equal:
          path: spec.hostnames
          value:
            - "*.studios.example.com"

  - it: should template global.studiosDomain
    set:
      httpRoute.enabled: true
      global.studiosDomain: "{{ .Release.Name }}.studios.example.com"
    asserts:
      - equal:
          path: spec.hostnames[0]
          value: "*.RELEASE-NAME.studios.example.com"

  - it: should route the wildcard host to the proxy service
    set:
      httpRoute.enabled: true
      global.studiosDomain: studios.example.com
      httpRoute.path: /
      httpRoute.matchType: PathPrefix
    asserts:
      - equal:
          path: spec.rules
          value:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              backendRefs:
                - name: release-name-studios-proxy
                  port: 80

  - it: should attach to parentRefs from local httpRoute
    set:
      httpRoute.enabled: true
      httpRoute.parentRefs:
        - name: seqera-gateway
          namespace: gateway-system
          sectionName: https
    asserts:
      - equal:
          path: spec.parentRefs
          value:
            - name: seqera-gateway
              namespace: gateway-system
              sectionName: https

  - it: should fall back to global.httpRoute.parentRefs when local is empty
    set:
      httpRoute.enabled: true
      global.httpRoute.parentRefs:
        - name: shared-gateway
          namespace: infra
    asserts:
      - equal:
          path: spec.parentRefs
          value:
            - name: shared-gateway
              namespace: infra

  - it: should prefer local httpRoute.parentRefs over global
    set:
      httpRoute.enabled: true
      httpRoute.parentRefs:
        - name: local-gateway
      global.httpRoute.parentRefs:
        - name: shared-gateway
    asserts:
      - equal:
          path: spec.parentRefs
          value:
            - name: local-gateway

  - it: should omit parentRefs when none are set
    set:
      httpRoute.enabled: true
    asserts:
      - notExists:
          path: spec.parentRefs

  - it: should fall back to global.httpRoute.matchType when local is empty
    set:
      httpRoute.enabled: true
      httpRoute.matchType: ""
      global.httpRoute.matchType: Exact
    asserts:
      - equal:
          path: spec.rules[0].matches[0].path.type
          value: Exact

  - it: should handle proxy.service.http.port as template string
    set:
      httpRoute.enabled: true
      proxy.service.http.port: "{{ .Release.Namespace | len | add 9000 }}"
    asserts:
      - equal:
          path: spec.rules[0].backendRefs[0].port
          value: 9009

  - it: should render each extraHost as its own HTTPRoute with multiple paths
    set:
      httpRoute.enabled: true
      global.studiosDomain: studios.example.com
      httpRoute.extraHosts:
        - host: custom.example.com
          paths:
            - path: /v1
              matchType: PathPrefix
              serviceName: api-v1
              portNumber: 8080
            - path: /v2
              serviceName: api-v2
              portNumber: "8081"
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: release-name-studios-extra-0
      - equal:
          path: spec.hostnames
          value:
            - custom.example.com
      - equal:
          path: spec.rules
          value:
            - matches:
                - path:
                    type: PathPrefix
                    value: /v1
              backendRefs:
                - name: api-v1
                  port: 8080
            - matches:
                - path:
                    type: PathPrefix
                    value: /v2
              backendRefs:
                - name: api-v2
                  port: 8081

  - it: should merge annotations and labels, local wins on collision
    set:
      httpRoute.enabled: true
      commonLabels:
        common-label: common-value
      commonAnnotations:
        common-annotation: common-value
      httpRoute.annotations:
        shared: local
      global.httpRoute.annotations:
        shared: global
        global-only: "yes"
      httpRoute.extraLabels:
        shared-label: local
      global.httpRoute.extraLabels:
        shared-label: global
        global-label: "yes"
    asserts:
      - isSubset:
          path: metadata.annotations
          content:
            shared: local
            global-only: "yes"
            common-annotation: common-value
      - isSubset:
          path: metadata.labels
          content:
            shared-label: local
            global-label: "yes"
            common-label: common-value

  - it: should render complete httproute with all options
    set:
      httpRoute.enabled: true
      global.studiosDomain: studios.example.com
      httpRoute.matchType: PathPrefix
      httpRoute.path: /
      httpRoute.parentRefs:
        - name: seqera-gateway
          namespace: gateway-system
          sectionName: https
      httpRoute.annotations:
        external-dns.alpha.kubernetes.io/hostname: "*.studios.example.com"
      httpRoute.extraLabels:
        environment: production
      httpRoute.extraHosts:
        - host: api.example.com
          paths:
            - path: /
              serviceName: api-service
              portNumber: "8080"
    asserts:
      - matchSnapshot: {}
