suite: test MCP secret
templates:
  - secret.yaml
chart:
  version: 1.2.3
  appVersion: "v9.9.9"
tests:
  - it: should render a Secret with default values
    set:
      oauth.jwtSeedString: mysecretjwtseed
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - matchSnapshot: {}

  - it: should render a Secret with no values when user passes no strings
    set:
      oauth.jwtSeedSecretName: my-existing-secret
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - isEmpty:
          path: data

  - it: should include OAUTH_JWT_SECRET when not using external secret
    set:
      oauth.jwtSeedString: mysecretpassword
    asserts:
      - equal:
          path: data.OAUTH_JWT_SECRET
          value: mysecretpassword
          decodeBase64: true

  - it: should NOT include OAUTH_JWT_SECRET when using external secret
    set:
      oauth.jwtSeedSecretName: my-external-secret
    asserts:
      - isNull:
          path: data.OAUTH_JWT_SECRET

  - it: should include OAUTH_CLIENT_SECRET when using external oauth instead of default platform oauth
    set:
      micronautEnvironments: [oauth]
      oauth.clientSecretString: myclientsecret
    asserts:
      - equal:
          path: data.OAUTH_CLIENT_SECRET
          value: myclientsecret
          decodeBase64: true

  - it: should NOT include OAUTH_CLIENT_SECRET when using external secret and custom OAuth provider
    set:
      micronautEnvironments: [oauth]
      oauth.clientSecretExistingSecretName: my-client-secret
    asserts:
      - isNull:
          path: data.OAUTH_CLIENT_SECRET

  - it: should render imagePullSecret when global.imageCredentials is set
    set:
      global.imageCredentials:
        - registry: cr.seqera.io
          username: robot
          password: secret123
    asserts:
      - hasDocuments:
          count: 2
      - isKind:
          of: Secret
        documentIndex: 1
      - equal:
          path: type
          value: kubernetes.io/dockerconfigjson
        documentIndex: 1
