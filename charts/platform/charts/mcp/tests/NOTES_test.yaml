suite: test MCP NOTES.txt
templates:
  - NOTES.txt
chart:
  version: 1.0.0
  appVersion: "v1.0.0"
tests:
  # oauth-platform environment: clientId/clientSecret fields must NOT be set
  - it: should fail when oauth.clientId is set with oauth-platform environment
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.clientId: "my-client-id"
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth-platform' environment, 'oauth.clientId', 'oauth.clientSecretString' and 'oauth.clientSecretExistingSecretName' must not be set\\."

  - it: should fail when oauth.clientSecretString is set with oauth-platform environment
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.clientSecretString: "my-client-secret"
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth-platform' environment, 'oauth.clientId', 'oauth.clientSecretString' and 'oauth.clientSecretExistingSecretName' must not be set\\."

  - it: should fail when oauth.clientSecretExistingSecretName is set with oauth-platform environment
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.clientSecretExistingSecretName: "my-client-secret"
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth-platform' environment, 'oauth.clientId', 'oauth.clientSecretString' and 'oauth.clientSecretExistingSecretName' must not be set\\."

  - it: should pass when no client credentials are set with oauth-platform environment
    set:
      micronautEnvironments:
        - oauth-platform
    asserts:
      - hasDocuments:
          count: 1

  # oauth and oauth-platform are mutually exclusive
  - it: should fail when both oauth and oauth-platform are set
    set:
      micronautEnvironments:
        - oauth-platform
        - oauth
    asserts:
      - failedTemplate:
          errorPattern: "'oauth-platform' and 'oauth' environments are mutually exclusive and cannot both be set in 'micronautEnvironments'\\."

  # oauth environment: issuerUrl, clientId and clientSecret are required
  - it: should fail when oauth.issuerUrl is missing with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: ""
      oauth.clientId: "my-client-id"
      oauth.clientSecretString: "my-client-secret"
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth' environment, 'oauth.issuerUrl' must be set\\."

  - it: should fail when oauth.clientId is missing with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: "https://custom-auth.example.com"
      oauth.clientId: ""
      oauth.clientSecretString: "my-client-secret"
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth' environment, 'oauth.clientId' must be set\\."

  - it: should fail when both oauth.clientSecretString and oauth.clientSecretExistingSecretName are missing with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: "https://custom-auth.example.com"
      oauth.clientId: "my-client-id"
      oauth.clientSecretString: ""
      oauth.clientSecretExistingSecretName: ""
    asserts:
      - failedTemplate:
          errorPattern: "When using 'oauth' environment, either 'oauth.clientSecretString' or 'oauth.clientSecretExistingSecretName' must be set\\."

  - it: should fail when both oauth.clientSecretString and oauth.clientSecretExistingSecretName are set with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: "https://custom-auth.example.com"
      oauth.clientId: "my-client-id"
      oauth.clientSecretString: "my-client-secret"
      oauth.clientSecretExistingSecretName: "my-client-secret-name"
    asserts:
      - failedTemplate:
          errorPattern: "Either provide 'oauth.clientSecretString' or an existing secret name in 'oauth.clientSecretExistingSecretName', but not both\\."

  - it: should pass when clientId and clientSecretString are set with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: "https://custom-auth.example.com"
      oauth.clientId: "my-client-id"
      oauth.clientSecretString: "my-client-secret"
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when clientId and clientSecretExistingSecretName are set with oauth environment
    set:
      micronautEnvironments:
        - oauth
      oauth.issuerUrl: "https://custom-auth.example.com"
      oauth.clientId: "my-client-id"
      oauth.clientSecretExistingSecretName: "my-client-secret-name"
    asserts:
      - hasDocuments:
          count: 1

  # JWT seed mutual exclusion
  - it: should fail when both oauth.jwtSeedString and oauth.jwtSeedSecretName are set
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.jwtSeedString: "my-jwt-seed"
      oauth.jwtSeedSecretName: "my-jwt-secret"
    asserts:
      - failedTemplate:
          errorPattern: "Either provide 'oauth.jwtSeedString' or an existing secret name in 'oauth.jwtSeedSecretName', but not both\\."

  - it: should pass when only oauth.jwtSeedString is set
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.jwtSeedString: "my-jwt-seed"
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when only oauth.jwtSeedSecretName is set
    set:
      micronautEnvironments:
        - oauth-platform
      oauth.jwtSeedSecretName: "my-jwt-secret"
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when neither jwt seed value is set
    set:
      micronautEnvironments:
        - oauth-platform
    asserts:
      - hasDocuments:
          count: 1
