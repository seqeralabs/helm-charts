suite: test MCP deployment
templates:
  - deployment.yaml
  - secret.yaml
  - configmap.yaml
chart:
  version: 1.2.3
  appVersion: "v9.9.9"
tests:
  - it: should render a Deployment with default values
    template: deployment.yaml
    set:
      oauth.jwtSeedSecretName: my-jwt-secret
      oauth.jwtSeedSecretKey: jwt-seed-key
      oidcToken.existingSecretName: my-oidc-secret
      oidcToken.existingSecretKey: MY_OIDC_TOKEN
    asserts:
      - matchSnapshot: {}

  - it: should inject TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN from standalone secret by default
    template: deployment.yaml
    set:
      oidcToken.existingSecretName: ""
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0]
          value:
            name: TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: release-name-mcp
                key: TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN

  - it: should inject TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN from existing secret when set
    template: deployment.yaml
    set:
      oidcToken.existingSecretName: my-platform-backend
      oidcToken.existingSecretKey: MY_OIDC_KEY
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0]
          value:
            name: TOWER_OIDC_REGISTRATION_INITIAL_ACCESS_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-platform-backend
                key: MY_OIDC_KEY

  - it: should use custom image
    template: deployment.yaml
    set:
      image.registry: custom-registry.io
      image.repository: custom/mcp
      image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom-registry.io/custom/mcp:v1.2.3

  - it: should render extraEnvVars, extraEnvVarsCMs and extraEnvVarsSecrets
    template: deployment.yaml
    set:
      extraEnvVars:
      - name: EXTRA_ENV_VAR_1
        value: set-a-value-here
      - name: EXTRA_ENV_VAR_2
        value: set-a-value-here
      extraEnvVarsCMs:
      - CMContainingExtraEnvVars
      extraEnvVarsSecrets:
      - SecretContainingExtraEnvVars
    asserts:
    - contains:
        path: spec.template.spec.containers[0].env
        content:
          name: EXTRA_ENV_VAR_1
          value: set-a-value-here
    - contains:
        path: spec.template.spec.containers[0].env
        content:
          name: EXTRA_ENV_VAR_2
          value: set-a-value-here
    - contains:
        path: spec.template.spec.containers[0].envFrom
        content:
          configMapRef:
            name: CMContainingExtraEnvVars
    - contains:
        path: spec.template.spec.containers[0].envFrom
        content:
          secretRef:
            name: SecretContainingExtraEnvVars

  - it: should mount extra volumes
    template: deployment.yaml
    set:
      extraVolumes:
        - name: custom-volume
          emptyDir: {}
      extraVolumeMounts:
        - name: custom-volume
          mountPath: /custom
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: custom-volume
            emptyDir: {}
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: custom-volume
            mountPath: /custom

  - it: should apply custom resources
    template: deployment.yaml
    set:
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 512Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources
          value:
            limits:
              cpu: 1000m
              memory: 1Gi
            requests:
              cpu: 500m
              memory: 512Mi

  - it: should include init containers
    template: deployment.yaml
    set:
      initContainers:
        - name: wait-for-db
          image: busybox
          command: ['sh', '-c', 'echo waiting']
    asserts:
      - contains:
          path: spec.template.spec.initContainers
          content:
            name: wait-for-db
            image: busybox
            command: ['sh', '-c', 'echo waiting']

  - it: should apply common labels
    template: deployment.yaml
    set:
      commonLabels:
        custom-label: custom-value
    asserts:
      - isSubset:
          path: metadata.labels
          content:
            custom-label: custom-value

  - it: should support custom init containers alongside built-in ones
    template: deployment.yaml
    set:
      initContainerDependencies.enabled: true
      initContainerDependencies.waitForMySQL.enabled: true
      dbMigrationInitContainer.enabled: true
      initContainers:
        - name: custom-init
          image: busybox
          command: ['sh', '-c', 'echo custom']
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: custom-init

  - it: should use external secret for JWT seed
    template: deployment.yaml
    set:
      oauth.jwtSeedSecretName: my-jwt-secret
      oauth.jwtSeedSecretKey: jwt-seed-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-jwt-secret
                key: jwt-seed-key

  - it: should use default key when JWT seed external secret is set without custom key
    template: deployment.yaml
    set:
      oauth.jwtSeedSecretName: my-jwt-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-jwt-secret
                key: OAUTH_JWT_SECRET

  - it: should use external secret for OAuth client secret
    template: deployment.yaml
    set:
      oauth.clientSecretExistingSecretName: my-oauth-client-secret
      oauth.clientSecretExistingSecretKey: oauth-client-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-oauth-client-secret
                key: oauth-client-key

  - it: should use default key when OAuth client secret external secret is set without custom key
    template: deployment.yaml
    set:
      oauth.clientSecretExistingSecretName: my-oauth-client-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: my-oauth-client-secret
                key: OAUTH_CLIENT_SECRET

  - it: should configure main container with env before envFrom
    template: deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OAUTH_JWT_SECRET
            valueFrom:
              secretKeyRef:
                key: OAUTH_JWT_SECRET
                name: release-name-mcp

  - it: should render extraOptionsSpec under spec
    template: deployment.yaml
    set:
      extraOptionsSpec:
        replicas: 3
        revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.replicas
          value: 3
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: shouldn't obey custom selector requests in extraOptionsSpec
    template: deployment.yaml
    set:
      extraOptionsSpec:
        selector:
          matchLabels:
            app: something-else
    asserts:
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/component: mcp
            app.kubernetes.io/instance: RELEASE-NAME
            app.kubernetes.io/name: mcp

  - it: should render extraOptionsTemplateSpec under spec.template.spec
    template: deployment.yaml
    set:
      extraOptionsTemplateSpec:
        nodeSelector:
          disktype: ssd
        affinity:
          podAntiAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mcp
              topologyKey: kubernetes.io/hostname
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            disktype: ssd
      - equal:
          path: spec.template.spec.affinity
          value:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchExpressions:
                  - key: app
                    operator: In
                    values:
                    - mcp
                topologyKey: kubernetes.io/hostname

  - it: should ignore managed fields in extraOptionsTemplateSpec
    template: deployment.yaml
    set:
      extraOptionsTemplateSpec:
        serviceAccountName: some-other-sa
        dnsPolicy: ClusterFirstWithHostNet
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name-mcp-sa
      - equal:
          path: spec.template.spec.dnsPolicy
          value: ClusterFirstWithHostNet

  - it: should render podAnnotations on the pod template
    template: deployment.yaml
    set:
      podAnnotations:
        custom-annotation: custom-value
        another-annotation: another-value
    asserts:
      - isSubset:
          path: spec.template.metadata.annotations
          content:
            custom-annotation: custom-value
            another-annotation: another-value

  - it: should render image pullSecrets
    template: deployment.yaml
    set:
      image.pullSecrets:
        - myRegistrySecret
    asserts:
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: myRegistrySecret

  - it: should render extraOptionsTemplateSpec with nodeSelector
    template: deployment.yaml
    set:
      extraOptionsTemplateSpec:
        nodeSelector:
          service: tower
          kubernetes.io/arch: amd64
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector
          value:
            service: tower
            kubernetes.io/arch: amd64

  - it: should ignore serviceAccountName in extraOptionsTemplateSpec
    template: deployment.yaml
    set:
      extraOptionsTemplateSpec:
        serviceAccountName: some-other-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: release-name-mcp-sa
