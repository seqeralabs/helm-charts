global:
  platformExternalDomain: platform.example.com
  # The domains where Seqera AI applications will be exposed are automatically derived from the
  # `platformExternalDomain` value, but they can be overridden by setting the following values:
  # mcpDomain: mcp.platform.example.com
  # portalDomain: ai.platform.example.com
  # agentBackendDomain: ai-api.platform.example.com

# platform-related settings are omitted here for brevity

agent-backend:
  enabled: true

  database:
    host: my-db.example.com
    name: agent_backend_db_name
    username: agent_backend_username
    existingSecretName: my-already-created-secret

  redis:
    host: my-redis.example.com
    existingSecretName: my-already-created-secret

  anthropicApiKeyExistingSecretName: my-already-created-secret
  tokenEncryptionKeyExistingSecretName: my-already-created-secret

  ingress:
    enabled: true
    # other ingresses settings (e.g. className, annotations) can be set here

portal-web:
  auth0:
    domain: my-oidc-domain.example.com
    clientId: the-oidc-app-client-id

  ingress:
    enabled: true
    # other ingresses settings (e.g. className, annotations) can be set here

mcp:
  enabled: true

  oidcToken:
    existingSecretName: my-already-created-secret

  oauth:
    jwtSeedSecretName: my-already-created-secret

  ingress:
    enabled: true
    # other ingresses settings (e.g. className, annotations) can be set here
