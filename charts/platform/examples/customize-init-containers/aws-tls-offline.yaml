# AWS RDS TLS example — offline / air-gapped (CA bundle pre-loaded in a ConfigMap)
#
# Before deploying, download the AWS CA bundle for the region where your RDS instances are (or the
# global bundle) and store it in a ConfigMap:
#
#   curl -sSf \
#     https://truststore.pki.rds.amazonaws.com/<region>/<region>-bundle.pem \
#     -o aws-rds-ca-bundle.pem
#
#   kubectl create configmap aws-rds-ca-bundle \
#     --from-file=ca-bundle.pem=aws-rds-ca-bundle.pem \
#     --namespace <your-namespace>
#
# The ConfigMap is then mounted directly into the init containers — no init container
# is needed to fetch the cert at runtime, making this suitable for air-gapped environments.
#
# The volume must be declared on every deployment that runs the waitFor* init containers —
# both backend and cron in this case.
#
# More details about AWS RDS TLS configuration:
# https://docs.aws.amazon.com/AmazonRDS/latest/UserGuide/UsingWithRDS.SSL.html
#
# Replace the placeholder values below with your actual configuration.

global:
  platformExternalDomain: platform.example.com

platformDatabase:
  host: mydb.cluster-xxxxxxxxxxxx.us-east-1.rds.amazonaws.com
  port: 3306
  name: platformdb
  username: platformuser
  connectionOptions:
    mariadb:
      - permitMysqlScheme=true
      # verify-full uses SSL/TLS for encryption, does certificate and hostname verification.
      - sslMode=verify-full
      - serverSslCert=/certs/ca-bundle.pem

redis:
  host: mycluster.xxxxxx.ng.0001.use1.cache.amazonaws.com
  port: 6379
  enableTls: true

# The ConfigMap volume must be declared on every deployment that uses the waitFor* init
# containers. For the platform chart that is backend and cron.
backend:
  extraVolumes:
    - name: aws-rds-ca-bundle
      configMap:
        name: aws-rds-ca-bundle
  extraVolumeMounts:
    - name: aws-rds-ca-bundle
      mountPath: /certs
      readOnly: true

cron:
  extraVolumes:
    - name: aws-rds-ca-bundle
      configMap:
        name: aws-rds-ca-bundle
  extraVolumeMounts:
    - name: aws-rds-ca-bundle
      mountPath: /certs
      readOnly: true
  # The migrate-db init container connects to RDS directly and also needs the CA cert.
  dbMigrationInitContainer:
    extraVolumeMounts:
      - name: aws-rds-ca-bundle
        mountPath: /certs
        readOnly: true

initContainerDependencies:
  waitForMySQL:
    extraEnvVars:
      - name: MYSQL_EXTRA_ARGS
        value: "--ssl-ca=/certs/ca-bundle.pem --ssl-mode=VERIFY_IDENTITY"
    extraVolumeMounts:
      - name: aws-rds-ca-bundle
        mountPath: /certs
        readOnly: true

pipeline-optimization:
  enabled: true
  extraVolumes:
    - name: rds-ca-bundle
      configMap:
        name: aws-rds-ca-bundle

  extraVolumeMounts:
    - name: rds-ca-bundle
      mountPath: /rds-ca
      readOnly: true

  database:
    # pipeline-optimization db details
    enableTls: true
    sslCa: /rds-ca/rds-ca-bundle.pem

  platformDatabase:
    # platform db details
    enableTls: true
    sslCa: /rds-ca/rds-ca-bundle.pem

agent-backend:
  enabled: true
  extraVolumes:
    - name: rds-ca-bundle
      configMap:
        name: aws-rds-ca-bundle

  extraVolumeMounts:
    - name: rds-ca-bundle
      mountPath: /rds-ca
      readOnly: true

  initContainerDependencies:
    waitForMySQL:
      extraEnvVars:
        - name: MYSQL_EXTRA_ARGS
          value: "--ssl-ca=/rds-ca/rds-ca-bundle.pem --ssl-mode=VERIFY_IDENTITY"
      extraVolumeMounts:
        - name: rds-ca-bundle
          mountPath: /rds-ca
          readOnly: true

  database:
    enableTls: true
    sslCa: /rds-ca/rds-ca-bundle.pem
