      # -- Init container image repository
      # @section -- Init Container Dependencies: Wait For Redis
      repository: redis
      # @schema
      # type: [string, number]
      # @schema
      # -- Init container image tag
      # @section -- Init Container Dependencies: Wait For Redis
      tag: 7-alpine
      # -- Init container image digest in the format `sha256:1234abcdef`
      # @section -- Init Container Dependencies: Wait For Redis
      digest: ""
      # -- imagePullPolicy for the init container
      # @section -- Init Container Dependencies: Wait For Redis
      pullPolicy: IfNotPresent

    securityContext:
      # -- UID the container processes run as (overrides container image default)
      # @section -- Init Container Dependencies: Wait For Redis
      runAsUser: 101
      # -- Require the container to run as a non-root UID (prevents starting if UID
      # 0)
      # @section -- Init Container Dependencies: Wait For Redis
      runAsNonRoot: true
      # -- Mount the container root filesystem read-only to prevent in-place writes or tampering
      # @section -- Init Container Dependencies: Wait For Redis
      readOnlyRootFilesystem: true
      # -- Fine-grained Linux kernel privileges to add or drop for the container
      # @section -- Init Container Dependencies: Wait For Redis
      capabilities:
        drop:
          - ALL

    # -- Container requests and limits for different resources like CPU or memory
    # @section -- Init Container Dependencies: Wait For Redis
    resources:
      requests:
        cpu: "0.5"
        memory: "50Mi"
      limits:
        memory: "100Mi"

    # -- Additional environment variables for the init container
    # @section -- Init Container Dependencies: Wait For Redis
    extraEnvVars: []
    # -- Additional volume mounts for the init container (e.g. to mount a CA certificate)
    # @section -- Init Container Dependencies: Wait For Redis
    extraVolumeMounts: []

  waitForCron:
    # -- Enable wait for Platform cron init container before starting backend
    # @section -- Init Container Dependencies: Wait For Cron
    enabled: true
    image:
      # -- Override default wait for cron init container image
      # @section -- Init Container Dependencies: Wait For Cron
      registry: ""
      # -- Init container image repository
      # @section -- Init Container Dependencies: Wait For Cron
      repository: curlimages/curl
      # @schema
      # type: [string, number]
      # @schema
      # -- Init container image tag
      # @section -- Init Container Dependencies: Wait For Cron
      tag: latest
      # -- Init container image digest in the format `sha256:1234abcdef`
      # @section -- Init Container Dependencies: Wait For Cron
      digest: ""
      # -- imagePullPolicy for the init container
      # @section -- Init Container Dependencies: Wait For Cron
      pullPolicy: IfNotPresent

    securityContext:
      # -- UID the container processes run as (overrides container image default)
      # @section -- Init Container Dependencies: Wait For Cron
      runAsUser: 101
      # -- Require the container to run as a non-root UID (prevents starting if UID
      # 0)
      # @section -- Init Container Dependencies: Wait For Cron
      runAsNonRoot: true
      # -- Mount the container root filesystem read-only to prevent in-place writes or tampering
      # @section -- Init Container Dependencies: Wait For Cron
      readOnlyRootFilesystem: true
      # -- Fine-grained Linux kernel privileges to add or drop for the container
      # @section -- Init Container Dependencies: Wait For Cron
      capabilities:
        drop:
          - ALL

    # -- Container requests and limits for different resources like CPU or memory
    # @section -- Init Container Dependencies: Wait For Cron
    resources:
      requests:
        cpu: "0.5"
        memory: "50Mi"
      limits:
        memory: "100Mi"

    # -- Additional environment variables for the init container
    # @section -- Init Container Dependencies: Wait For Cron
    extraEnvVars: []
    # -- Additional volume mounts for the init container (e.g. to mount a CA certificate)
    # @section -- Init Container Dependencies: Wait For Cron
    extraVolumeMounts: []

serviceAccount:
  # -- Whether to create a ServiceAccount. When `true`, the ServiceAccount named by
  # `serviceAccount.name` is created (a `<release>-<chart>-sa` name is generated when it is unset).
  # Set to `false` to use an existing, externally-managed ServiceAccount referenced by
  # `serviceAccount.name`.
  # @section -- Service Account
  create: true
  # -- Name of the ServiceAccount used by this chart's workloads. When empty, a name is generated
  # from the release name. Applies whether the ServiceAccount is created by this chart
  # (`create: true`) or managed externally (`create: false`).
  # @section -- Service Account
  name: ""
  # -- Additional annotations for the ServiceAccount to generate
  # @section -- Service Account
  annotations: {}
  # -- Names of Secrets containing credentials to pull images from registries
  # @section -- Service Account
  imagePullSecretNames: []
  # @schema
  # type: [boolean, string]
  # @schema
  # -- Automount service account token when the service account is generated
  # @section -- Service Account
  automountServiceAccountToken: false

ingress:
  # -- Enable ingress for Platform
  # @section -- Ingress
  enabled: false

  # -- Path for the main ingress rule. When empty, falls back to `global.ingress.path`
  # @section -- Ingress
  path: ""

  # -- Path for the content domain ingress rule. When empty, falls back to `ingress.path`
  # @section -- Ingress
  contentPath: ""

  # -- Default path type for the Ingress. When empty, falls back to `global.ingress.defaultPathType`
  # @section -- Ingress
  defaultPathType: ""

  # -- Configure the default service for the ingress (evaluated as template)
  # Important: make sure only one defaultBackend is defined across the k8s cluster: if the
  # ingress doesn't reconcile successfully, 'describe ingress <name>' will report problems
  # @section -- Ingress
  defaultBackend: {}
  # defaultBackend:
  #   service:
  #     name: '{{ printf "%s-frontend" (include "common.names.fullname" .) }}'
  #     port:
  #       number: '{{ .Values.frontend.service.http.port }}'

  # -- Additional hosts you want to include. Evaluated as a template.
  # Each path's backend takes either `portNumber` or `portName` (e.g. `use-annotation`
  # to reference an ALB action defined via `ingress.annotations`).
  # @section -- Ingress
  extraHosts: []
  # extraHosts:
  #   - host: '{{ printf "api.%s" .Values.global.platformExternalDomain }}'
  #     paths:
  #       - path: /*
  #         pathType: Prefix  # Optional, defaults to defaultPathType
  #         serviceName: '{{ printf "%s-backend" (include "common.names.fullname" .) }}'
  #         portNumber: '{{ .Values.global.platformServicePort }}'
  #   - host: '{{ printf "www.%s" .Values.global.platformExternalDomain }}'
  #     paths:
  #       - path: /*
  #         pathType: Prefix  # Optional, defaults to defaultPathType
  #         serviceName: '{{ printf "%s-frontend" (include "common.names.fullname" .) }}'
  #         portNumber: '{{ .Values.frontend.service.http.port }}'
  #   # Redirect an alternate host to the canonical domain via an ALB redirect action.
  #   # Requires a matching action under ingress.annotations, for example:
  #   #   alb.ingress.kubernetes.io/actions.redirect-to-service: >
  #   #     {"Type":"redirect","RedirectConfig":{"Protocol":"HTTPS","Host":"{{ tpl .Values.global.platformExternalDomain . }}","Port":"443","Path":"/#{path}","Query":"#{query}","StatusCode":"HTTP_301"}}
  #   - host: alternatedomain.example.com
  #     paths:
  #       - path: /*
  #         serviceName: redirect-to-service   # must match the actions.<name> annotation
  #         portName: use-annotation

  # -- Ingress annotations specific to your load balancer. Evaluated as a template
  # @section -- Ingress
  annotations: {}
  # -- Additional labels for the ingress object. Evaluated as a template
  # @section -- Ingress
  extraLabels: {}
  # -- Name of the ingress class (replaces the deprecated annotation `kubernetes.io/ingress.class`).
  # When empty, falls back to `global.ingress.ingressClassName`
  # @section -- Ingress
  ingressClassName: ""
  # -- TLS configuration. Evaluated as a template
  # @section -- Ingress
  tls: []
  # tls:
  #   - hosts:
  #       - '{{ .Values.global.platformExternalDomain }}'
  #       - '{{ printf "user-data.%s" .Values.global.platformExternalDomain }}'
  #     secretName: my-tls

# -- Array of extra objects to deploy with the release
# @section -- Common
extraDeploy: []
# extraDeploy:
#   - apiVersion: v1
#     kind: MyExtraObjectKind
#     ...
#   - apiVersion: v1
#     kind: AnotherExtraObjectKind
#     ...

# -- Annotations to add to all deployed objects
# @section -- Common
commonAnnotations: {}
# -- Labels to add to all deployed objects
# @section -- Common
commonLabels: {}

studios:
  # -- Enable Studios feature. Refer to the subchart README for more details and the full list of
  # configuration options
  # @section -- Subcharts: Studios
  enabled: true
  proxy:
    # -- studios needs to pass a client registration token to the platform backend so that it can
    # register studios clients to the platform OIDC provider. If the platform oidc registration
    # token is coming from a separate secret, you need to update it here too.
    # `common.names.dependency.fullname` is used (rather than `common.names.fullname`) because this
    # value is `tpl`-evaluated inside the studios subchart context where `.Chart.Name` is `studios`,
    # not `platform`; passing `chartName: platform` explicitly reproduces the parent's fullname.
    # Name of the existing Secret containing the OIDC client registration token to share with the
    # Studios proxy. Evaluated as a template
    # @section -- Subcharts: Studios
    oidcClientRegistrationTokenSecretName: '{{ printf "%s-backend" (include "common.names.dependency.fullname" (dict "chartName" "platform" "chartValues" .Values "context" .)) }}'
    # -- Key in the existing Secret containing the OIDC client registration token
    # @section -- Subcharts: Studios
    oidcClientRegistrationTokenSecretKey: "OIDC_CLIENT_REGISTRATION_TOKEN"

pipeline-optimization:
  # -- Enable pipeline optimization feature. Refer to the subchart README for more details and the
  # full list of configuration options
  # @section -- Subcharts: Pipeline Optimization
  enabled: true

mcp:
  # -- Enable the Seqera Model Context Protocol (MCP) service. Refer to the subchart README for more
  # details and the full list of configuration options
  # @section -- Subcharts: MCP
  enabled: true
  oidcToken:
    # -- mcp needs to pass a client registration token to the platform backend so that it can register
    # mcp clients to the platform OIDC provider. If the platform oidc registration token is coming
    # from a separate secret, you need to update it here too.
    # `common.names.dependency.fullname` is used (rather than `common.names.fullname`) because this
    # value is `tpl`-evaluated inside the mcp subchart context where `.Chart.Name` is `mcp`, not
    # `platform`; passing `chartName: platform` explicitly reproduces the parent's fullname.
    # Name of the existing Secret containing the OIDC client registration token to share with
    # MCP. Evaluated as a template
    # @section -- Subcharts: MCP
    existingSecretName: '{{ printf "%s-backend" (include "common.names.dependency.fullname" (dict "chartName" "platform" "chartValues" .Values "context" .)) }}'
    # -- Key in the existing Secret containing the OIDC client registration token
    # @section -- Subcharts: MCP
    existingSecretKey: "OIDC_CLIENT_REGISTRATION_TOKEN"

agent-backend:
  # -- Enable agent backend feature used by seqera cli ai command. Refer to the subchart README for
  # more details and the full list of configuration options
  # @section -- Subcharts: Agent Backend
  enabled: true

portal-web:
  # -- Enable portal web frontend. Refer to the subchart README for more details and the full list
