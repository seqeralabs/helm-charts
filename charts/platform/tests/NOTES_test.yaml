suite: test Platform requirements
templates:
  - ../templates/NOTES.txt
tests:
  - it: should fail when global.platformServiceAddress is not a valid DNS entry
    set:
      global:
        platformServiceAddress: "invalid_address_with_underscores"
    asserts:
      - failedTemplate:
          errorPattern: "'global.platformServiceAddress' must be a valid DNS subdomain \\(a-z, 0-9, and '-'\\)\\."

  - it: should fail when global.platformServicePort is not a valid port
    set:
      global:
        platformServicePort: "invalid"
    asserts:
      - failedTemplate:
          errorPattern: "must be an integer between 1 and 65535"

  - it: should fail when platformDatabase.host is not defined
    set:
      platformDatabase:
        host: ""
    asserts:
      - failedTemplate:
          # failedTemplate.errorMessage fails due to this bug: https://github.com/helm-unittest/helm-unittest/issues/652
          errorPattern: "Define the MySQL database hostname at 'platformDatabase.host'\\."

  - it: should fail when neither platformDatabase.password nor platformDatabase.existingSecretName is provided
    set:
      platformDatabase:
        host: "whatever"
        password: ""
        existingSecretName: ""
    asserts:
      - failedTemplate:
          errorPattern: "Either a database password at 'platformDatabase.password' or an existing secret name at 'platformDatabase.existingSecretName' must be provided\\."

  - it: should fail when redis.host is not defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: ""
    asserts:
      - failedTemplate:
          errorPattern: "Define the Redis hostname in 'redis.host'"

  - it: should fail when no license is defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: ""
    asserts:
      - failedTemplate:
          errorPattern: "Either a string version of the License at platform.licenseString or a secret name at platform.licenseSecretName are needed, not both."

  - it: should fail when both platform.jwtSeedString and platform.jwtSeedSecretName are defined
    set:
      redis:
        host: "whatever"
      platformDatabase:
        host: "whatever"
        password: "whatever"
      platform:
        licenseString: "whatever"
        jwtSeedString: "whatever"
        jwtSeedSecretName: "whatever"
    asserts:
      - failedTemplate:
          errorPattern: "Either a string version of the JWT seed at platform.jwtSeedString or a secret name at platform.jwtSeedSecretName are needed, not both."

  - it: should fail when both platform.cryptoSeedString and platform.cryptoSeedSecretName are defined
    set:
      redis:
        host: "whatever"
      platformDatabase:
        host: "whatever"
        password: "whatever"
      platform:
        licenseString: "whatever"
        cryptoSeedString: "whatever"
        cryptoSeedSecretName: "whatever"
    asserts:
      - failedTemplate:
          errorPattern: "Either a string version of the Crypto seed at platform.cryptoSeedString or a secret name at platform.cryptoSeedSecretName are needed, not both."

  - it: should fail if migrate-db args are set but command is not
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
      cron:
        dbMigrationInitContainer:
          command: []
          args: ["--some-arg"]
    asserts:
      - failedTemplate:
          errorPattern: "If 'cron.dbMigrationInitContainer.args' are provided, 'cron.dbMigrationInitContainer.command' must also be provided."

  - it: should fail when an empty list of execution backends is defined
    set:
      redis:
        host: "whatever"
      platformDatabase:
        host: "whatever"
        password: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: []
    asserts:
      - failedTemplate:
          errorPattern: "At least one execution backend must be defined in 'platform.executionBackends'"

  - it: should pass when redis.host and platformDatabase.host are defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when platformDatabase.password is provided
    set:
      platformDatabase:
        host: "whatever"
        password: "mypassword"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when platformDatabase.existingSecretName is provided
    set:
      platformDatabase:
        host: "whatever"
        existingSecretName: "my-secret"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when redis.host is defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should fail when agent-backend is enabled and database.host is not defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: ""
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: "test-anthropic-key"
        redis:
          host: "redis.example.com"
    asserts:
      - failedTemplate:
          errorPattern: "Define the Agent Backend database host at 'agent-backend.database.host'\\."

  - it: should fail when agent-backend is enabled and no Anthropic credentials are set
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: "database.example.com"
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: ""
        anthropicApiKeyExistingSecretName: ""
        redis:
          host: "redis.example.com"
    asserts:
      - failedTemplate:
          errorPattern: "Define the Anthropic API key at 'agent-backend.anthropicApiKey' or provide an existing secret name at 'agent-backend.anthropicApiKeyExistingSecretName'\\."

  - it: should fail when agent-backend is enabled and redis.host is not defined
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: "database.example.com"
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: "test-anthropic-key"
        redis:
          host: ""
    asserts:
      - failedTemplate:
          errorPattern: "Define the Agent Backend Redis host at 'agent-backend.redis.host'\\."

  - it: should fail when agent-backend AgentCore ARN is set without region
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: "database.example.com"
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: "test-anthropic-key"
        redis:
          host: "redis.example.com"
        agentcore:
          agentArn: "arn:aws:bedrock-agentcore:eu-west-2:123456789012:runtime/example-runtime"
          region: ""
    asserts:
      - failedTemplate:
          errorPattern: "Define the AgentCore region at 'agent-backend.agentcore.region' when 'agent-backend.agentcore.agentArn' is set\\."

  - it: should fail when agent-backend AgentCore region is set without ARN
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: "database.example.com"
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: "test-anthropic-key"
        redis:
          host: "redis.example.com"
        agentcore:
          agentArn: ""
          region: "eu-west-2"
    asserts:
      - failedTemplate:
          errorPattern: "Define the AgentCore runtime ARN at 'agent-backend.agentcore.agentArn' when 'agent-backend.agentcore.region' is set\\."

  - it: should pass when agent-backend is disabled without agent-backend values
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should pass when agent-backend is enabled with required values
    set:
      platformDatabase:
        host: "whatever"
        password: "whatever"
      redis:
        host: "whatever"
      platform:
        licenseString: "whatever"
        executionBackends: [anything]
      agent-backend:
        enabled: true
        database:
          host: "database.example.com"
          name: "agent_backend"
          username: "agent"
          password: "test-password"
        anthropicApiKey: "test-anthropic-key"
        redis:
          host: "redis.example.com"
    asserts:
      - hasDocuments:
          count: 1
