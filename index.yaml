  - annotations:
      artifacthub.io/changes: |-
        - kind: added
          description: 'Added `serviceAccount.create` (default `true`) to the `platform` chart and every subchart (agent-backend, mcp, pipeline-optimization, portal-web, studios, wave) to control whether each chart creates its ServiceAccount. When `true`, the ServiceAccount named by `serviceAccount.name` is created (or a generated `<release>-<chart>-sa` name when unset), so a custom ServiceAccount name can now be created rather than only referenced.'
        - kind: added
          description: 'Added `docs/service-accounts.md` documenting every ServiceAccount created by the chart, how the names are generated per release, and the `serviceAccount.create` / `serviceAccount.name` controls.'
        - kind: changed
          description: '**BREAKING**: `serviceAccount.name` no longer suppresses ServiceAccount creation in the `platform` chart or any subchart. Previously, setting `serviceAccount.name` caused the chart to skip creating a ServiceAccount and reference an existing one instead. Creation is now gated solely on `serviceAccount.create` (default `true`). Migration: if you set `serviceAccount.name` to reference an externally-managed ServiceAccount, also set `serviceAccount.create: false` to preserve the previous behaviour.'
        - kind: changed
          description: 'Downgrade the default `waitForMySQL` init container image tag from `9` to `8.4` in the `platform` chart and the `agent-backend` and `pipeline-optimization` subcharts, so all `waitForMySQL` init containers default to MySQL `8.4`.'
