    version: 1.2.1
  - annotations:
      artifacthub.io/changes: |-
        - kind: added
          description: 'Added `serviceAccount.create` (default `true`) to control whether the chart creates its ServiceAccount. When `true`, the ServiceAccount named by `serviceAccount.name` is created (or a generated `<release>-<chart>-sa` name when unset), so a custom ServiceAccount name can now be created rather than only referenced.'
        - kind: changed
          description: 'Downgrade the default `waitForMySQL` init container image tag from `9` to `8.4` to match the MySQL version used elsewhere in the chart.'
        - kind: changed
          description: '**BREAKING**: `serviceAccount.name` no longer suppresses ServiceAccount creation. Previously, setting `serviceAccount.name` caused the chart to skip creating a ServiceAccount and reference an existing one instead. Creation is now gated solely on `serviceAccount.create` (default `true`). Migration: if you set `serviceAccount.name` to reference an externally-managed ServiceAccount, also set `serviceAccount.create: false` to preserve the previous behaviour.'
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
        - name: Seqera Docs
          url: https://docs.seqera.io
        - name: Helm charts repository
          url: https://github.com/seqeralabs/helm-charts/
