  - annotations:
      artifacthub.io/changes: |-
        - kind: added
          description: '`ingress.extraHosts[].paths[].portName` as an alternative to `portNumber`, for referencing ALB annotation-based actions (for example `portName: use-annotation`). Takes precedence over `portNumber` when both are set.'
        - kind: fixed
          description: '`WAVE_SERVER_URL` in the ConfigMap is now derived from `global.waveDomain` instead of `global.platformExternalDomain`, so it points at the Wave subdomain (for example `https://wave.<platformExternalDomain>`) used for container pulls.'
        - kind: fixed
          description: 'The Redis password Secret key now defaults to `REDIS_PASSWORD` (matching the key the chart''s Secret writes and the documented default for `redis.existingSecretKey`) instead of `WAVE_REDIS_PASSWORD`. Previously the deployment''s `secretKeyRef` pointed at `WAVE_REDIS_PASSWORD` while the chart-managed Secret stored the value under `REDIS_PASSWORD`, so setting `redis.password` inline caused the pod to fail to start with `CreateContainerConfigError`.'
      artifacthub.io/license: Apache-2.0
      artifacthub.io/links: |
        - name: Seqera Docs
          url: https://docs.seqera.io
        - name: Helm charts repository
          url: https://github.com/seqeralabs/helm-charts/
