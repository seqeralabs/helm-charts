suite: test Portal Web extra resources
templates:
  - extra-list.yaml
tests:
  - it: should not create extra resources by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should handle explicitly empty extraDeploy list
    set:
      extraDeploy: []
    asserts:
      - hasDocuments:
          count: 0

  - it: should create extra resources as requested by the user
    set:
      extraDeploy:
        - apiVersion: v1
          kind: Service
          metadata:
            name: test-service
          spec:
            type: ClusterIP
            ports:
              - name: testport
                port: 1234
                targetPort: 5678
            selector:
              app.kubernetes.io/component: whatever
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Service
      - matchSnapshot: {}

  - it: should create multiple extra resources as requested by the user
    set:
      extraDeploy:
        - apiVersion: v1
          kind: Service
          metadata:
            name: test-service
          spec:
            type: ClusterIP
            ports:
              - name: testport
                port: 1234
                targetPort: 5678
            selector:
              app.kubernetes.io/component: whatever

        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: myConfigMap
          data:
            key: somevalue
    asserts:
      - hasDocuments:
          count: 2
      - equal:
          path: metadata.name
          value: test-service
        documentSelector:
          path: kind
          value: Service
      - matchSnapshot: {}
        documentSelector:
          path: kind
          value: Service
      - equal:
          path: metadata.name
          value: myConfigMap
        documentSelector:
          path: kind
          value: ConfigMap
      - matchSnapshot: {}
        documentSelector:
          path: kind
          value: ConfigMap

  - it: should evaluate template strings in extraDeploy resources
    set:
      extraDeploy:
        - apiVersion: v1
          kind: ConfigMap
          metadata:
            name: "{{ .Release.Name }}-dynamic-config"
            labels:
              app: "{{ .Chart.Name }}"
          data:
            release: "{{ .Release.Name }}"
            namespace: "{{ .Release.Namespace }}"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap
      - matchSnapshot: {}
