name: Helm chart packager
on:
  push:
    paths: # The order of path filtering matters.
      - '*/**' # Trigger on changes in subdirs only, not in files in the main repo.
      - '!.*/**' # Exclude files in subdirs starting with dots (e.g., .github).

jobs:
  check-if-version-is-available-and-update-helm-chart:
    name: 'Update Helm chart'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # ratchet:tj-actions/changed-files@v47.0.5
        with:
          json: true
          write_output_files: true

      - name: Set up Helm
        run: |
          curl -fsSL -o helm.tar.gz https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz
          echo "0165ee4a2db012cc657381001e593e981f42aa5707acdd50658326790c9d0dc3  helm.tar.gz" | sha256sum -c
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Extract list of changed Helm charts
        id: extract-charts
        # This script defines the charts_to_package env var with a space-separated list of charts to
        # package based on the changed files
        run: python3 .github/scripts/extract_charts.py

      - name: Run chart test linter
        if: env.charts_to_package != ''
        run: python3 .github/scripts/helm_unittests_files_exist.py

      - name: Check for existence of helm charts on registry
        if: env.charts_to_package != ''
        env:
          REPO_HOSTNAME: ${{vars.SEQERA_HELM_CHARTS_CR_HOSTNAME}}
          REPO_PROJECT: ${{vars.SEQERA_HELM_CHARTS_CR_PROJECT}}
          REPO_USERNAME: ${{vars.SEQERA_HELM_CHARTS_CR_USERNAME}}
          REPO_PASSWORD: ${{secrets.SEQERA_HELM_CHARTS_CR_PASSWORD}}
        run: python3 .github/scripts/check_chart_versions.py

      - name: 'Build Helm charts'
        if: env.charts_to_package != ''
        run: |
          for chart in $charts_to_package; do
            echo "Packaging chart ${chart}.."
            # Fetch the dependencies for the helm chart, stored in the charts/ subdir, if needed.
            helm dependency update ${chart}/

            # Extract chart name from path for package naming
            # For subcharts like platform/charts/pipeline-optimization, use the last component
            chart_name=$(basename ${chart})

            # Package the chart
            helm package ${chart}/
            chart_version=$(yq -r '.version' ${chart}/Chart.yaml)
            echo "Packaged chart ${chart} ($(du -sh ${chart_name}-${chart_version}.tgz | cut -f1))"
          done

      - name: Check subchart version coverage in parent dependencies
        if: env.charts_to_package != ''
        run: python3 .github/scripts/check_subchart_version_coverage.py

      - name: Install crane
        if: github.ref_name == 'master' && env.charts_to_package != ''
        uses: imjasonh/setup-crane@6da1ae018866400525525ce74ff892880c099987 # ratchet:imjasonh/setup-crane@v0.5

      - name: 'Push Helm charts only if we are on master'
        if: github.ref_name == 'master' && env.charts_to_package != ''
        shell: bash
        env:
          REPO_HOSTNAME: ${{vars.SEQERA_HELM_CHARTS_CR_HOSTNAME}}
          REPO_PROJECT: ${{vars.SEQERA_HELM_CHARTS_CR_PROJECT}}
          REPO_USERNAME: ${{vars.SEQERA_HELM_CHARTS_CR_USERNAME}}
          REPO_PASSWORD: ${{secrets.SEQERA_HELM_CHARTS_CR_PASSWORD}}
        run: |
          pushed_digests=()

          rollback() {
            if [ ${#pushed_digests[@]} -eq 0 ]; then
              return
            fi
            echo "Push failed — rolling back ${#pushed_digests[@]} already-pushed chart(s)..."
            crane auth login "${REPO_HOSTNAME}" --username "${REPO_USERNAME}" --password "${REPO_PASSWORD}"
            for digest_ref in "${pushed_digests[@]}"; do
              echo "Deleting ${digest_ref}..."
              crane delete "${digest_ref}" || echo "WARNING: Failed to delete ${digest_ref}, manual cleanup may be required"
            done
          }

          for chart in $charts_to_package; do
            chart_name=$(yq -r '.name' ${chart}/Chart.yaml)
            chart_version=$(yq -r '.version' ${chart}/Chart.yaml)
            echo "Pushing chart ${chart} (${chart_name}), version ${chart_version} ($(du -sh ${chart_name}-${chart_version}.tgz | cut -f1)).."
            push_start=$(date +%s)
            push_output=$(helm push ${chart_name}-${chart_version}.tgz "oci://${REPO_HOSTNAME}/${REPO_PROJECT}/" --username "${REPO_USERNAME}" --password "${REPO_PASSWORD}" --debug 2>&1) || {
              echo "${push_output}"
              rollback
              exit 1
            }
            echo "${push_output}"
            digest=$(echo "${push_output}" | grep -oP 'Digest: \K\S+')
            pushed_digests+=("${REPO_HOSTNAME}/${REPO_PROJECT}/${chart_name}@${digest}")
            echo "Pushed chart ${chart_name} in $(($(date +%s) - push_start))s"
          done

      - name: 'Create GitHub releases for packaged charts'
        if: github.ref_name == 'master' && env.charts_to_package != ''
        shell: bash
        run: |
          for chart in $charts_to_package; do
            chart_name=$(yq -r '.name' ${chart}/Chart.yaml)
            chart_version=$(yq -r '.version' ${chart}/Chart.yaml)
            release_tag="${chart_name}-${chart_version}"

            echo "Creating release for ${chart} (${chart_name}) version ${chart_version}.."

            # Create additional chart installation instructions
            # Use a unique temp file name to avoid collisions
            temp_file="/tmp/release-notes-footer-${chart_name}-${chart_version}.md"
            cat > ${temp_file} << EOF

          ## Chart Information

          - **OCI Registry**: \`oci://${{vars.SEQERA_HELM_CHARTS_CR_HOSTNAME}}/${{vars.SEQERA_HELM_CHARTS_CR_PROJECT}}/${chart_name}:${chart_version}\`
          - **Chart README**: [${chart}/README.md](https://github.com/${{ github.repository }}/blob/${release_tag}/${chart}/README.md)

          ## Installation

          \`\`\`bash
          helm pull oci://${{vars.SEQERA_HELM_CHARTS_CR_HOSTNAME}}/${{vars.SEQERA_HELM_CHARTS_CR_PROJECT}}/${chart_name} --version ${chart_version}
          \`\`\`
          EOF

            # Create the release with auto-generated notes and attach the
            # packaged chart as a release asset so it can be served as a
            # standard Helm repository via GitHub Pages (see cr index step below).
            gh release create "${release_tag}" \
              --repo ${{ github.repository }} \
              --title "${chart_name} ${chart_version}" \
              --generate-notes \
              --notes-file ${temp_file} \
              "${chart_name}-${chart_version}.tgz"

            echo "Created release ${release_tag}"
          done

      - name: 'Bootstrap empty gh-pages branch if missing'
        if: github.ref_name == 'master' && env.charts_to_package != ''
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            echo "gh-pages branch already exists."
            exit 0
          fi
          echo "Creating empty gh-pages branch."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git worktree add --orphan -b gh-pages gh-pages-init
          cd gh-pages-init
          # .nojekyll prevents GitHub Pages from running the index through Jekyll,
          # which would mangle filenames starting with an underscore.
          touch .nojekyll
          git add .nojekyll
          git commit -m "Initialize gh-pages branch"
          git push origin gh-pages

      - name: 'Install chart-releaser'
        if: github.ref_name == 'master' && env.charts_to_package != ''
        run: |
          curl -fsSL -o cr.tar.gz https://github.com/helm/chart-releaser/releases/download/v1.8.1/chart-releaser_1.8.1_linux_amd64.tar.gz
          echo "834046b27b00cd6ba451326875c1937d4f2b671063c2053e031434ade73002b5  cr.tar.gz" | sha256sum -c
          tar -xzf cr.tar.gz cr
          sudo mv cr /usr/local/bin/cr

      - name: 'Update GitHub Pages Helm repo index'
        if: github.ref_name == 'master' && env.charts_to_package != ''
        shell: bash
        env:
          CR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Stage the freshly packaged .tgz files for cr index. The .tgz themselves
          # are hosted as GitHub Release assets (uploaded in the previous step);
          # cr uses this directory only to discover which charts to include.
          mkdir -p .cr-release-packages
          for chart in $charts_to_package; do
            chart_name=$(yq -r '.name' ${chart}/Chart.yaml)
            chart_version=$(yq -r '.version' ${chart}/Chart.yaml)
            mv "${chart_name}-${chart_version}.tgz" .cr-release-packages/
          done

          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"

          cr index \
            --owner "${owner}" \
            --git-repo "${repo}" \
            --token "${CR_TOKEN}" \
            --package-path .cr-release-packages \
            --index-path .cr-index \
            --pages-branch gh-pages \
            --push
