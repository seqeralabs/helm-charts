name: Package Azure CNAB

on:
  workflow_dispatch:
    inputs:
      image_backend:
        description: "Platform backend image override (registry/repository:tag)"
        required: false
        default: ""
      image_frontend:
        description: "Platform frontend image override (registry/repository:tag)"
        required: false
        default: ""
      image_cron_migratedb:
        description: "Platform cron/migrate-db image override (registry/repository:tag)"
        required: false
        default: ""
      image_studios_proxy:
        description: "Studios connect-proxy image override (registry/repository:tag)"
        required: false
        default: ""
      image_studios_server:
        description: "Studios connect-server image override (registry/repository:tag)"
        required: false
        default: ""
      image_pipeline_optimization:
        description: "Pipeline optimization (groundswell) image override (registry/repository:tag)"
        required: false
        default: ""
      bundle_version:
        description: "CNAB bundle version override (defaults to Chart.yaml version)"
        required: false
        default: ""

# Required for Azure OIDC authentication.
# 'id-token: write' allows the runner to request an OIDC token from GitHub,
# which Azure then exchanges for an access token (no stored secrets needed).
permissions:
  id-token: write
  contents: read

jobs:
  package-azure-cnab:
    name: Package Azure CNAB bundle
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2

      - name: Set up Helm
        run: |
          curl -fsSL -o helm.tar.gz https://get.helm.sh/helm-v3.20.1-linux-amd64.tar.gz
          echo "0165ee4a2db012cc657381001e593e981f42aa5707acdd50658326790c9d0dc3  helm.tar.gz" | sha256sum -c
          tar -xzf helm.tar.gz
          sudo mv linux-amd64/helm /usr/local/bin/helm

      - name: Login to Seqera CR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # ratchet:docker/login-action@v4.1.0
        with:
          username: ${{ secrets.SEQERA_CR_PULL_CREDENTIALS_USERNAME }}
          password: ${{ secrets.SEQERA_CR_PULL_CREDENTIALS_PASSWORD }}
          registry: cr.seqera.io

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # ratchet:azure/login@v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.AZURE_MARKETPLACE_REPO }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # ratchet:aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::195996028523:role/helm-charts-ecr-pull-role
          aws-region: eu-west-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # ratchet:aws-actions/amazon-ecr-login@v2.1.2

      - name: Install Skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Copy images to Azure registry and package Azure CNAB
        run: |
          MAKE_ARGS="REGISTRY=${{ secrets.AZURE_MARKETPLACE_REPO }} IMAGE_PREFIX=images"
          [ -n "${{ inputs.image_backend }}" ]               && MAKE_ARGS="$MAKE_ARGS IMAGE_BACKEND=${{ inputs.image_backend }}"
          [ -n "${{ inputs.image_frontend }}" ]              && MAKE_ARGS="$MAKE_ARGS IMAGE_FRONTEND=${{ inputs.image_frontend }}"
          [ -n "${{ inputs.image_cron_migratedb }}" ]        && MAKE_ARGS="$MAKE_ARGS IMAGE_CRON_MIGRATEDB=${{ inputs.image_cron_migratedb }}"
          [ -n "${{ inputs.image_studios_proxy }}" ]         && MAKE_ARGS="$MAKE_ARGS IMAGE_STUDIOS_PROXY=${{ inputs.image_studios_proxy }}"
          [ -n "${{ inputs.image_studios_server }}" ]        && MAKE_ARGS="$MAKE_ARGS IMAGE_STUDIOS_SERVER=${{ inputs.image_studios_server }}"
          [ -n "${{ inputs.image_pipeline_optimization }}" ] && MAKE_ARGS="$MAKE_ARGS IMAGE_PIPELINE_OPTIMIZATION=${{ inputs.image_pipeline_optimization }}"
          [ -n "${{ inputs.bundle_version }}" ]              && MAKE_ARGS="$MAKE_ARGS BUNDLE_VERSION=${{ inputs.bundle_version }}"

          make -C marketplace/azure/platform copy-images $MAKE_ARGS
          make -C marketplace/azure/platform package-azure-cnab $MAKE_ARGS
